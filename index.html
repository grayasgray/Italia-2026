<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0f1117"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Italia 2026"/>
  <meta name="description" content="Your personal Italy 2026 travel companion"/>

  <title>Italia 2026</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.json"/>

  <link rel="apple-touch-icon" href="./icons/icon-512.png"/>

  <!-- Styles -->

<body>

    <div class="loading-screen">
      <img src="./icons/icon-192.png" class="loading-eagle" alt=""/>
      <p class="loading-text">Italia 2026</p>
    </div>
  </div>

  <!-- Scripts in dependency order -->
  <script src="./js/store.js"></script>
  <script src="./js/ics-parser.js"></script>
  <script src="./js/claude.js"></script>
  <script src="./js/app.js"></script>

</html>
